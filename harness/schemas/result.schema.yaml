$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://github.com/elliewlh2094/robotics-skills-benchmark/blob/main/harness/schemas/result.schema.yaml"
title: "Robotics Skills Benchmark Experiment Result"
description: |
  One result.json captures a single experiment run identified by the
  reproducibility tuple (plugin_tag, plugin_sha, base_sha, schema_version, run_id).

  This schema is the canonical machine definition; the human-readable companion
  is docs/result-json-reference.md. Validated on every write inside
  harness/run_experiment.py:write_result(), so any result that lands on disk
  has been schema-checked.

  Lifecycle: status starts as "incomplete" (partial-write before the agent
  runs) and transitions to "success", "error", or "timeout". The schema
  permits both states; the if/then rules below enforce the mode-specific
  invariants per status.

  Plugin sourcing is one of two modes (per ADR-0001) — local --plugin-path or
  --plugin-repo + --plugin-ref. Both modes record plugin_path (in URL+ref mode,
  the runner reassigns plugin_path to the materialized worktree). The mode is
  distinguished by the *values* of plugin_repo / plugin_ref (null vs string),
  not by key presence.

type: object
additionalProperties: false

required:
  # Always present, even on the first partial-write before the agent runs.
  - schema_version
  - experiment_id
  - plugin_tag
  - plugin_path
  - plugin_repo
  - plugin_ref
  - plugin_sha
  - task_id
  - run_id
  - base_repo
  - base_sha
  - scope_files_declared
  - available_tools
  - max_turns
  - seed
  - status
  - started_at
  - completed_at
  - runtime_s
  - exit_code
  - error
  - files_modified
  - transcript_bytes
  - scoring
  - hook_blocks
  - judge_calls
  # scratch_dir is conditionally required: present when status != success
  # (set from the first partial-write so it's available even if the runner
  # crashes before the agent runs); rejected when status == success
  # (worktree pruned per ADR-0002). Enforced in the allOf rules below.

properties:
  schema_version:
    type: integer
    const: 1
    description: |
      result.json schema version. Bumped only when the shape changes
      incompatibly. Part of the reproducibility tuple per ADR-0001.

  experiment_id:
    type: string
    description: |
      The experiment directory's basename: <YYYY-MM-DD>_<plugin_tag>_<task_id>_<run_id>.
      Self-referential: matches the parent directory's name.

  # ---- Plugin sourcing (per ADR-0001) ----
  plugin_tag:
    type: string
    description: |
      Human-supplied label (e.g., v0.1.0). Need not match plugin_ref exactly —
      useful for pre-tag development. Not canonical for reproducibility;
      plugin_sha is.

  plugin_path:
    type: string
    description: |
      Local filesystem path the runner passed to claude --plugin-dir. Always
      a string (in URL+ref mode the runner reassigns plugin_path to the
      materialized cache worktree).

  plugin_repo:
    type: ["string", "null"]
    description: |
      URL of the plugin repo when --plugin-repo mode was used; null in local
      --plugin-path mode. Pairs with plugin_ref.

  plugin_ref:
    type: ["string", "null"]
    description: |
      Git ref (tag, branch, or SHA) requested at materialization time.
      Non-null in URL+ref mode; null in local --plugin-path mode.

  plugin_sha:
    type: ["string", "null"]
    pattern: "^[a-f0-9]{40}$"
    description: |
      The 40-char commit SHA at HEAD of the plugin path at run time. Canonical
      reproducibility key per ADR-0001. Null when plugin_path is not a git
      working tree (the runner emits a warning in that case).

  # ---- Task identity ----
  task_id:
    type: string
    pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
    description: |
      Matches the folder name under tasks/instances/. Part of the reproducibility tuple.

  run_id:
    type: string
    description: |
      Distinguishes repeated runs of the same (plugin_tag, task_id) pair
      (e.g., baseline-1, baseline-2, baseline-3). Part of the reproducibility
      tuple.

  base_repo:
    type: string
    format: uri
    description: HTTPS URL of the task repo, copied from task.yaml at run time.

  base_sha:
    type: string
    pattern: "^[a-f0-9]{40}$"
    description: |
      40-char commit SHA the task worktree was checked out at. Part of the
      reproducibility tuple.

  # ---- Run-time configuration snapshot ----
  scope_files_declared:
    type: array
    items: { type: string }
    description: |
      The scope_files list as it appeared in task.yaml at run time. The
      "_declared" suffix distinguishes this snapshot from out_of_scope_paths
      (the *derived* list of violations).

  available_tools:
    type: ["array", "null"]
    items: { type: string }
    description: |
      The available_tools list from task.yaml at run time, or null when the
      task didn't declare one (in which case the runner fell back to
      --dangerously-skip-permissions and emitted a warning).

  max_turns:
    type: integer
    minimum: 1
    description: |
      The --max-turns ceiling passed to claude. Defense against runaway
      agentic loops, per ADR-0006.

  seed:
    type: ["string", "null"]
    description: |
      BENCHMARK_SEED env var passed to the agent, or null when not set. Used
      by sim-metric tasks (Phase 4+) where physics nondeterminism would
      otherwise contaminate scoring.

  # ---- Lifecycle / outcome ----
  status:
    type: string
    enum: [incomplete, success, error, timeout]
    description: |
      Lifecycle position. "incomplete" = partial-write before the agent runs;
      transitions to one of {success, error, timeout} after the agent
      completes (or fails to).

  started_at:
    type: string
    format: date-time
    description: |
      UTC ISO-8601 timestamp. Initially the partial-write time; overwritten
      with the agent subprocess's actual start time once the agent runs.

  completed_at:
    type: ["string", "null"]
    format: date-time
    description: |
      UTC ISO-8601 timestamp; null while status="incomplete". Set when the
      agent completes (success/error/timeout) or when the runner crashes.

  runtime_s:
    type: ["number", "null"]
    minimum: 0
    description: |
      Wall-clock seconds from agent start to agent end (or to the runner's
      crash point). Null while status="incomplete".

  exit_code:
    type: ["integer", "null"]
    description: |
      Subprocess exit code from the agent. Null while status="incomplete".
      -1 indicates the runner aborted the agent (timeout or missing binary).

  error:
    description: |
      Null on success/incomplete; { type, message } on error/timeout/runner-crash.
    oneOf:
      - type: "null"
      - type: object
        additionalProperties: false
        required: [type, message]
        properties:
          type: { type: string }
          message: { type: string }

  files_modified:
    type: array
    items: { type: string }
    description: |
      Paths the agent created or modified (from `git diff --cached --name-only
      base_sha`, after `git add -A`). Empty list while status="incomplete".

  transcript_bytes:
    type: integer
    minimum: 0
    description: |
      Length in bytes of the agent's stdout (rendered into transcript.md).
      0 while status="incomplete".

  # ---- Automated metrics surfaced at top level (per ADR-0003) ----
  hook_blocks:
    type: integer
    minimum: 0
    description: |
      Count of pre-commit-scope-check hook rejections during the run. Always 0
      in Phase 1 (the hook lands at task T2.3); a valid 0-state today, not
      "unknown".

  judge_calls:
    type: integer
    minimum: 0
    description: |
      Number of LLM-judge subprocess invocations (= n_trials when the rubric
      scorer ran, 0 otherwise). Surfaced at top level as an automated metric
      per ADR-0003. Useful for cost accounting in Phase 5+ cadence work.

  scratch_dir:
    type: string
    description: |
      Filesystem path of the task worktree under scratch_root. Set from the
      first partial-write so it's available even if the runner crashes before
      the agent runs. Removed (key absent) on successful runs per ADR-0002,
      where the worktree is pruned. Retained on incomplete/error/timeout for
      forensic inspection.

  # ---- Scoring (T1.4 + future scorers) ----
  scoring:
    type: object
    additionalProperties: true   # future scorers (test_pass, sim_metric, static_check) land here without a schema bump
    description: |
      Per-scorer outputs. Empty {} while status="incomplete".
      scope_check is required once status != "incomplete".
      rubric_scores is present iff the task's verification_method is rubric or hybrid.
    properties:
      scope_check:
        type: object
        additionalProperties: false
        required: [out_of_scope_file_count, out_of_scope_paths]
        properties:
          out_of_scope_file_count:
            type: integer
            minimum: 0
          out_of_scope_paths:
            type: array
            items: { type: string }

      rubric_scores:
        description: |
          Either successful aggregation across N trials, OR an error record
          if the judge subprocess failed. The runner records failures into
          the error shape rather than raising — losing the judge shouldn't
          lose the rest of the experiment's forensics.
        oneOf:
          - title: rubric-scores-success
            type: object
            additionalProperties: false
            required: [n_trials, per_trial, mean, stdev, overall_mean, overall_stdev]
            properties:
              n_trials:
                type: integer
                minimum: 1
              per_trial:
                type: array
                minItems: 1
                items:
                  type: object
                  additionalProperties: false
                  required: [scores, overall_recomputed, overall_judge_reported, rationale]
                  properties:
                    scores:
                      type: object
                      additionalProperties:
                        type: integer
                        minimum: 0
                        maximum: 3
                    overall_recomputed:
                      type: number
                      minimum: 0
                      maximum: 3
                    overall_judge_reported:
                      type: ["number", "null"]
                    rationale:
                      type: string
              mean:
                type: object
                additionalProperties: { type: number }
              stdev:
                type: object
                additionalProperties: { type: number, minimum: 0 }
              overall_mean:
                type: number
                minimum: 0
                maximum: 3
              overall_stdev:
                type: number
                minimum: 0
          - title: rubric-scores-error
            type: object
            additionalProperties: false
            required: [error]
            properties:
              error:
                type: object
                additionalProperties: false
                required: [type, message]
                properties:
                  type: { type: string }
                  message: { type: string }

# ---------------------------------------------------------------------------
# Cross-field invariants
# ---------------------------------------------------------------------------
allOf:

  # ---- Plugin sourcing: distinguish modes by VALUE, not by key presence ----
  # plugin_path is always a string; plugin_repo/plugin_ref are either both null
  # (local mode) or both non-null strings (URL+ref mode).
  - oneOf:
      - title: local-plugin-mode
        properties:
          plugin_repo: { type: "null" }
          plugin_ref:  { type: "null" }
      - title: clone-and-ref-mode
        properties:
          plugin_repo: { type: string }
          plugin_ref:  { type: string }

  # ---- status="incomplete" partial-write: many fields may be null/empty ----
  - if:
      properties: { status: { const: incomplete } }
    then:
      properties:
        completed_at: { type: "null" }
        runtime_s:    { type: "null" }
        exit_code:    { type: "null" }
        error:        { type: "null" }
        files_modified:
          type: array
          maxItems: 0
        transcript_bytes: { const: 0 }
        scoring:
          type: object
          maxProperties: 0   # must be {} — no scoring before agent runs
        judge_calls: { const: 0 }
        hook_blocks: { const: 0 }

  # ---- status="success": agent ran cleanly; error must be null; scratch_dir absent ----
  # `scratch_dir: false` rejects the property entirely (false-as-schema rejects
  # any value, so any presence of scratch_dir fails). The worktree was pruned
  # per ADR-0002, so the path is gone — recording it would lie.
  - if:
      properties: { status: { const: success } }
    then:
      properties:
        error:        { type: "null" }
        completed_at: { type: string }
        runtime_s:    { type: number }
        exit_code:    { type: integer }
        scoring:
          type: object
          required: [scope_check]
        scratch_dir: false

  # ---- status="error" or "timeout": error must be non-null; scratch_dir retained ----
  - if:
      properties: { status: { enum: [error, timeout] } }
    then:
      required: [scratch_dir]
      properties:
        error:
          type: object
          required: [type, message]
        completed_at: { type: string }

  # ---- status="incomplete" partial-write: scratch_dir is also required ----
  # (computed before the partial-write per refinement A; the dir exists even
  # if the runner crashes before the agent runs, since add_worktree precedes
  # the write).
  - if:
      properties: { status: { const: incomplete } }
    then:
      required: [scratch_dir]
